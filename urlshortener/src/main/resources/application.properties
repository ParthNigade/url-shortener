spring.application.name=urlshortener
# Server
server.port=8080

# MySQL Database (uses env vars in production, defaults for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/url_shortener}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis (uses env vars in production, defaults for local dev)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# App Config
app.base-url=${BASE_URL:http://localhost:8080}
app.short-code-length=7
app.default-expiry-days=365

# JWT Config
app.jwt.secret=${JWT_SECRET:d3c8f1a2b5e9f0a1d4c7b6e8a3f2d5c9e1b4a7f0d3c6b9e2a5f8d1c4b7e0a3}
app.jwt.expiration-ms=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html